<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cascades Meeting Timer</title>
  <style>
    :root {
      --fg: #0b1a1f;
      --muted: #5a6b73;
      --accent: #78be20;
      --accent-2: #c9ef9d;
      --bg: #f7faf9;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      width: min(980px, 96vw);
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,.08);
      padding: 24px 24px 18px;
      border: 2px solid #e8efe9;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .brand img { height: 44px; width: auto; display: block; }
    h1 { margin: 2px 0 0 0; font-size: clamp(20px, 3vw, 28px); }
    .sub { color: var(--muted); margin: 4px 0 18px 0; line-height: 1.5; }
    .timer { display: flex; align-items: baseline; gap: 14px; margin: 10px 0 6px; flex-wrap: wrap; }
    #time { font-weight: 850; letter-spacing: 1px; font-size: clamp(58px, 10vw, 96px); line-height: 1; }
    #segment { font-size: clamp(16px, 2.5vw, 24px); font-weight: 800; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button {
      border: 0; padding: 11px 15px; border-radius: 12px;
      font-weight: 800; cursor: pointer; background: #eef2ef; color: var(--fg);
    }
    button.primary { background: var(--accent); color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .pill { background: var(--accent-2); color: #234; padding: 4px 10px; border-radius: 999px; font-weight: 700; font-size: 12px; }
    .list { margin-top: 14px; border-top: 2px solid #f0f5f1; padding-top: 10px; max-height: 240px; overflow: auto; }
    .item { display: flex; justify-content: space-between; gap: 16px; padding: 10px 0; border-bottom: 1px dashed #edf4ee; }
    .current { font-weight: 900; color: var(--accent); }
    .muted { color: var(--muted); }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; color: var(--muted); font-size: 12px; gap: 12px; flex-wrap: wrap; }
    .flash { animation: flash 600ms ease-in-out 8; }
    @keyframes flash { 0%, 100% { color: var(--fg); } 50% { color: var(--accent); } }
    .accent-bar { height: 6px; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #9be34a 40%, var(--accent) 80%); margin: 8px 0 14px; }
    code { background: #f4f7f5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>

    </div>
    <h1>Cascades Meeting Timer</h1>
    <div class="accent-bar"></div>
    <div class="sub">
      Rapid Segue (2) → Scorecard Pulse (3) → Rocks Pulse (3) → Headlines (2) → Last-Week To-Dos (5) → IDS Sprint (12) → Wrap (3)
    </div>
    <div id="segment" class="flash">Loading&#8230;</div>
    <div class="timer">
      <div id="time">00:00</div>
      <span class="pill" id="pill">Ready</span>
    </div>
    <div class="row" style="margin: 10px 0 8px;">
      <button id="start" class="primary">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset">Reset</button>
      <button id="skip">Skip Segment</button>
      <span class="muted" id="status" aria-live="polite"></span>
    </div>
    <div class="list" id="upcoming"></div>
    <div class="footer">
      <div>Tip: change times via URL: <code>?m=2,3,3,2,5,12,3</code></div>
      <div>Built for Cascades &#10022; JMAG</div>
    </div>
  </div>
  <script>
    const AGENDA = [
      { name: "Rapid Segue",       minutes: 2  },
      { name: "Scorecard Pulse",   minutes: 3  },
      { name: "Rocks Pulse",       minutes: 3  },
      { name: "Headlines",         minutes: 2  },
      { name: "Last-Week To-Dos",  minutes: 5  },
      { name: "IDS Sprint",        minutes: 12 },
      { name: "Wrap",              minutes: 3  },
    ];
    const params = new URLSearchParams(window.location.search);
    if (params.has("m")) {
      const arr = params.get("m").split(",").map(x => Number(x.trim())).filter(n => !Number.isNaN(n));
      if (arr.length === AGENDA.length) AGENDA.forEach((seg, i) => seg.minutes = arr[i]);
    }
    let idx = 0, seconds = AGENDA[0].minutes * 60, ticking = false, interval = null, audioCtx = null;
    const elTime = document.getElementById("time");
    const elSegment = document.getElementById("segment");
    const elUpcoming = document.getElementById("upcoming");
    const elStart = document.getElementById("start");
    const elPause = document.getElementById("pause");
    const elReset = document.getElementById("reset");
    const elSkip = document.getElementById("skip");
    const elStatus = document.getElementById("status");
    const elPill = document.getElementById("pill");
    function chime(pattern=[440,660,880], dur=0.12, gap=0.05) {
      if (!audioCtx) return;
      let when = audioCtx.currentTime;
      pattern.forEach(freq => {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.001, when);
        gain.gain.exponentialRampToValueAtTime(0.3, when + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(when); osc.stop(when + dur);
        when += dur + gap;
      });
    }
    const pad = n => String(n).padStart(2,"0");
    const fmt = s => `${pad(Math.floor(s/60))}:${pad(s%60)}`;
    function setTitle() { if (idx < AGENDA.length) document.title = `Cascades Timer · ${AGENDA[idx].name} — ${fmt(seconds)}`; }
    function flashSegment() { elSegment.classList.remove("flash"); void elSegment.offsetWidth; elSegment.classList.add("flash"); }
    function render() {
      const seg = AGENDA[idx];
      elSegment.textContent = `${seg.name} (${seg.minutes} min)`;
      elTime.textContent = fmt(seconds);
      elPill.textContent = idx === 0 && !ticking ? "Ready" : (ticking ? "Running" : "Paused");
      setTitle();
      elUpcoming.innerHTML = "";
      AGENDA.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "item" + (i === idx ? " current" : "");
        div.innerHTML = `<span>${i === idx ? "&#9654; " : "&#8226; "}${s.name}</span><span class="muted">${s.minutes} min</span>`;
        elUpcoming.appendChild(div);
      });
    }
    function finishTimer() {
      ticking = false; clearInterval(interval); interval = null;
      elSegment.textContent = "All segments complete 🎉";
      elTime.textContent = "00:00"; document.title = "Cascades Timer — Done";
      chime([523,659,784,1046], 0.12, 0.05);
      elStatus.textContent = "Complete"; elPill.textContent = "Done";
      elPause.disabled = true; elStart.disabled = false;
    }
    function nextSegment() {
      idx += 1;
      if (idx >= AGENDA.length) { finishTimer(); return; }
      seconds = AGENDA[idx].minutes * 60; flashSegment(); chime([784,659,784], 0.09, 0.04); render();
    }
    function tick() {
      if (!ticking) return;
      seconds -= 1;
      if (seconds <= 0) nextSegment();
      else { elTime.textContent = fmt(seconds); setTitle(); }
    }
    elStart.addEventListener("click", () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (!ticking) {
        ticking = true; elStart.disabled = true; elPause.disabled = false;
        elStatus.textContent = "Running"; elPill.textContent = "Running";
        clearInterval(interval); interval = setInterval(tick, 1000);
      }
    });
    elPause.addEventListener("click", () => {
      ticking = false; elStart.disabled = false; elPause.disabled = true;
      elStatus.textContent = "Paused"; elPill.textContent = "Paused";
      clearInterval(interval); interval = null;
    });
    elReset.addEventListener("click", () => {
      ticking = false; clearInterval(interval); interval = null;
      idx = 0; seconds = AGENDA[0].minutes * 60;
      elStart.disabled = false; elPause.disabled = true;
      elStatus.textContent = "Reset"; elPill.textContent = "Ready";
      flashSegment(); render();
    });
    elSkip.addEventListener("click", () => {
      nextSegment();
      if (ticking) { clearInterval(interval); interval = setInterval(tick, 1000); }
    });
    render(); flashSegment();
  </script>
